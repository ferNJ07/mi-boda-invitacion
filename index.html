<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nuestra Boda | Invitación</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/favicon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <div id="overlay">
        <img src="assets/favicon2.png" alt="Logo" class="fade-in-logo">
        <button id="start-btn">INICIAR EXPERIENCIA</button>
    </div>

    <main id="content" class="hidden">
        <section class="hero">
            <div class="hero-content">
                <h1>Fernando & Valeria</h1>
                <p>NUESTRA BODA</p>
                <div id="countdown"></div>
            </div>
        </section>

        <section class="ubicacion">
            <div class="ubicacion-card">
                <div class="icon-pin">📍</div>
                <h2>Nuestra Ceremonia</h2>
                <p class="lugar-nombre">VIE EVENTS MTY</p>
                <p class="lugar-detalle">Av. Paseo de los Leones 7004, Valle de Cumbres, Monterrey.</p>
                
                <div class="map-container">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3594.1373539825453!2d-100.44213242416027!3d25.754432177358315!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8662973d748f6909%3A0xbab8c7f3825dfae9!2sVIE%20EVENTS%20MTY!5e0!3m2!1ses-419!2smx!4v1710000000000!5m2!1ses-419!2smx" 
                        width="100%" 
                        height="100%" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <div class="botones-maps">
                    <a href="https://maps.app.goo.gl/9DqP8jR8ZJ6nC9qj9" target="_blank" class="btn-maps">Google Maps</a>
                    <a href="https://waze.com/ul?ll=25.7548513,-100.4395575&navigate=yes" target="_blank" class="btn-waze">Waze</a>
                </div>
            </div>
        </section>

        <section class="dress-code">
            <h2>Dress Code</h2>
            <p>Etiqueta: Formal Playa</p>
            <div class="masonry-gallery">
                <img src="assets/dress1.jpg" alt="Inspiración 1">
                <img src="assets/dress2.jpg" alt="Inspiración 2">
                <img src="assets/dress3.jpg" alt="Inspiración 3">
                <img src="assets/dress4.jpg" alt="Inspiración 4">
                <img src="assets/dress5.jpg" alt="Inspiración 5">
                <img src="assets/dress6.jpg" alt="Inspiración 6">
            </div>
            <a href="https://pin.it/32yiB2dsx" class="btn-pinterest">Ver inspiración en Pinterest</a>
        </section>

        <section class="rsvp">
            <a href="https://wa.me/528186909432?text=¡Hola!%20Queremos%20confirmar%20nuestra%20asistencia%20a%20su%20boda.%20Nombre:%20_______" target="_blank" class="btn-wa">Confirmar por WhatsApp</a>
        </section>

    </main>
    <div id="audio-control">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
    <audio id="bg-music" loop src="assets/site_song.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
